<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фильтр участников</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; }
        .user-list { max-height: 300px; overflow-y: auto; }
        .user-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
        .user-item:hover { background: #f0f0f0; }
        .selected { background: #d0e8ff; }
        input { width: 100%; padding: 6px; margin-bottom: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <input type="text" id="search" placeholder="Поиск участника..." oninput="filterUsers()">
    <div class="user-list" id="userList">Загрузка...</div>
    <script src="/app.js"></script>
</body>
</html>
